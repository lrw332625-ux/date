async function applyParticipantSession(eid, participant, greeting){
  S.participant={...participant,event_id:eid,token:participant.token};
  localStorage.setItem('token_'+eid,participant.token);
  setSessionUserName(participant.name);
  updateRoleBar();
  saveMyEvent(eid,S.currentEvent?.title||eid,participant.name);
  clearPendingEvent();
  toast(`${greeting}${participant.name}！`);
  await loadMyAvail(eid);
  renderAvailGrid(eid,!!localStorage.getItem('admin_'+eid));
}

async function tryAutoEnterParticipantEvent(eid){
  const account=getCurrentAccount();
  if(!account?.username||!account?.password) return false;
  try{
    const loggedIn=await api('POST',`/api/events/${eid}/login`,{username:account.username,password:account.password});
    await applyParticipantSession(eid,loggedIn,'欢迎回来，');
    return true;
  }catch(loginErr){
    try{
      const joined=await api('POST',`/api/events/${eid}/join`,{
        username:account.username,
        name:account.name||account.username,
        email:'',
        password:account.password
      });
      await applyParticipantSession(eid,joined,'欢迎，');
      return true;
    }catch(joinErr){
      return false;
    }
  }
}

async function doJoin(eid){
  const u=document.getElementById('au').value.trim();
  const n=document.getElementById('an').value.trim();
  const e=document.getElementById('ae').value.trim();
  const p=document.getElementById('ap').value;
  if(!u){toast('请输入用户名');return}
  if(!n){toast('请输入姓名');return}
  if(!p||p.length<3){toast('密码至少3位');return}
  try{
    const r=await api('POST',`/api/events/${eid}/join`,{username:u,name:n,email:e,password:p});
    await applyParticipantSession(eid,r,'欢迎，');
  }catch(e){toast(e.message)}
}

async function doLogin(eid){
  const u=document.getElementById('au').value.trim();
  const p=document.getElementById('ap').value;
  if(!u||!p){toast('请输入用户名和密码');return}
  try{
    const r=await api('POST',`/api/events/${eid}/login`,{username:u,password:p});
    await applyParticipantSession(eid,r,'欢迎回来，');
  }catch(e){toast(e.message)}
}

async function loadMyAvail(eid){
  try{
    const all=await api('GET',`/api/events/${eid}/availability`);
    S.myAvailability={};
    all.forEach(a=>{if(a.participant_id===S.participant.participant_id) S.myAvailability[a.time_slot_id]=a.status});
  }catch(e){}
}
function clearMyAvailSelections(){
  S.myAvailability={};
  document.querySelectorAll('.avail-cell[data-slot]').forEach(c=>{
    c.className=c.className.replace(/ ?available| ?maybe/g,'');
  });
  toast('已清空当前选择，点击保存后才会生效');
}

// ===== Participant Availability Grid =====
function renderAvailGrid(eid,isAdmin){
  const ev=S.currentEvent;
  const dates=ev.dates;
  const savedCount=Object.keys(S.myAvailability).length;
  const gridGranularity=inferEventGranularity(ev);

  const allTimes=new Set();
  dates.forEach(d=>d.slots.forEach(s=>allTimes.add(s.start_time)));
  const tLabels=Array.from(allTimes).sort();

  const slotLookup={};
  dates.forEach((d,di)=>d.slots.forEach(s=>{slotLookup[di+'_'+s.start_time]=s}));

  // Week groups for separators
  const wg=[];let lm=null;
  dates.forEach((d,i)=>{const m=toDS(getMon(new Date(d.date+'T00:00:00')));if(m!==lm){wg.push(i);lm=m}});

  let g=`<div class="avail-grid" style="grid-template-columns:54px repeat(${dates.length},1fr)">`;
  g+=`<div class="corner"></div>`;
  dates.forEach((d,i)=>{
    const sd=shortD(d.date);const we=isWE(d.date)?' we':'';
    const wb=wg.includes(i)&&i>0?' wb':'';
    g+=`<div class="dh${we}${wb}"><div class="dow">${sd.dow}</div>${sd.md}</div>`;
  });

  tLabels.forEach(time=>{
    g+=`<div class="tl">${timeLabelHtml(time,gridGranularity)}</div>`;
    dates.forEach((d,di)=>{
      const slot=slotLookup[di+'_'+time];
      const we=isWE(d.date)?' we':'';
      const wb=wg.includes(di)&&di>0?' wb':'';
      if(slot){
        const st=S.myAvailability[slot.id]||'';
        g+=`<div class="avail-cell${we}${wb} ${st}" data-slot="${slot.id}"></div>`;
      }else{
        g+=`<div class="avail-cell disabled${wb}"></div>`;
      }
    });
  });
  g+=`</div>`;

  let adminBtn=isAdmin&&S.activeRole==='organizer'?`<button class="btn btn-o btn-sm" onclick="nav('/event/${eid}/edit')">编辑活动</button>`:'';

  app.innerHTML=`
    <div class="card">
      <div class="page-kicker">Vote</div>
      <h2>${esc(ev.title)}</h2>
      <div class="compact-meta">
        <span>发起人：${esc(ev.organizer)}</span>
        <span>${esc(summarizeDateRange(ev))}</span>
      </div>
      <p class="tm-c mt-8">${savedCount>0?`已载入你上次保存的 ${savedCount} 个选择。你可以直接修改后重新保存。`:'你还没有保存过时间，下面可以直接开始选择。'}</p>
      <div class="action-strip">
        <button class="btn btn-s btn-sm" onclick="clearMyAvailSelections()">清空我的时间</button>
        <button class="btn btn-g btn-sm" onclick="saveAvail('${eid}')" id="btn-sv-top">保存我的时间</button>
        <button class="btn btn-p btn-sm" onclick="nav('/event/${eid}/results')">结果</button>
        ${adminBtn}
      </div>
    </div>
    <div class="card">
      <div class="legend">
        <div class="legend-item"><div class="lc" style="background:#E2E8F0"></div>不可选</div>
        <div class="legend-item"><div class="lc" style="background:#fff;border-color:#E2E8F0"></div>未标记</div>
        <div class="legend-item"><div class="lc" style="background:#22C55E"></div>有空</div>
        <div class="legend-item"><div class="lc" style="background:#FBBF24"></div>也许</div>
      </div>
      <div class="grid-wrapper" id="gw">${g}</div>
      <div class="btn-row">
        <button class="btn btn-s mt-16" onclick="clearMyAvailSelections()">清空我的时间</button>
        <button class="btn btn-g mt-16" onclick="saveAvail('${eid}')" id="btn-sv">保存我的时间</button>
      </div>
    </div>
    <div class="card">
      <button class="btn btn-p" onclick="nav('/event/${eid}/results')">结果 →</button>
    </div>
    <div class="share-box">
      <div style="font-weight:600;margin-bottom:4px">邀请更多人参与</div>
      <div style="font-size:.9rem;margin:4px 0">活动代码：<strong style="font-family:monospace;font-size:1.1rem">${eid}</strong></div>
      <div class="share-url">${location.origin}/#/event/${eid}</div>
      <button class="btn btn-sm btn-s mt-8" onclick="shareLink('${eid}')">复制链接</button>
    </div>`;

  setupAvailDrag();
}

function setupAvailDrag(){
  let isDragging=false, dragStatus=null, lastCell=null;

  function nextSt(cur){return cur===''?'available':cur==='available'?'maybe':''}
  function applyCell(c,sid,st){
    if(st===''){delete S.myAvailability[sid];c.className=c.className.replace(/ ?available| ?maybe/g,'')}
    else{S.myAvailability[sid]=st;c.className=c.className.replace(/ ?available| ?maybe/g,'')+' '+st}
  }

  function startD(c){
    if(c.classList.contains('disabled')) return;
    const sid=parseInt(c.dataset.slot);if(!sid) return;
    isDragging=true;
    dragStatus=nextSt(S.myAvailability[sid]||'');
    applyCell(c,sid,dragStatus);lastCell=c;
    const lbl={'available':'拖选：有空','maybe':'拖选：也许','':'拖选：清除'};
    dragInd.textContent=lbl[dragStatus];dragInd.classList.add('show');
  }
  function moveD(cx,cy){
    if(!isDragging) return;
    const el=document.elementFromPoint(cx,cy);
    if(!el||!el.classList.contains('avail-cell')||el.classList.contains('disabled')||el===lastCell) return;
    const sid=parseInt(el.dataset.slot);if(!sid) return;
    applyCell(el,sid,dragStatus);lastCell=el;
  }
  function endD(){isDragging=false;dragStatus=null;lastCell=null;dragInd.classList.remove('show')}

  const gw=document.getElementById('gw');if(!gw) return;
  gw.addEventListener('mousedown',e=>{const c=e.target.closest('.avail-cell');if(c){e.preventDefault();startD(c)}});
  document.addEventListener('mousemove',e=>moveD(e.clientX,e.clientY));
  document.addEventListener('mouseup',endD);
  gw.addEventListener('touchstart',e=>{const c=e.target.closest('.avail-cell');if(c){e.preventDefault();startD(c)}},{passive:false});
  document.addEventListener('touchmove',e=>{if(!isDragging)return;e.preventDefault();moveD(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
  document.addEventListener('touchend',endD);
}

async function saveAvail(eid){
  const btn=document.getElementById('btn-sv');
  const topBtn=document.getElementById('btn-sv-top');
  if(btn){btn.disabled=true;btn.textContent='保存中...'}
  if(topBtn){topBtn.disabled=true;topBtn.textContent='保存中...'}
  const avail=Object.entries(S.myAvailability).map(([id,st])=>({time_slot_id:parseInt(id),status:st}));
  try{await api('PUT',`/api/events/${eid}/availability`,{availability:avail});toast('已保存！')}
  catch(e){toast(e.message)}
  if(btn){btn.disabled=false;btn.textContent='保存我的时间'}
  if(topBtn){topBtn.disabled=false;topBtn.textContent='保存我的时间'}
}

function shareLink(eid){
  const url=`${location.origin}/#/event/${eid}`;
  if(navigator.share) navigator.share({title:S.currentEvent?.title||'约聚会',text:'请填写你的空闲时间',url});
  else navigator.clipboard.writeText(url).then(()=>toast('链接已复制！'));
}

// ===== Results page =====
async function renderResults(eid){
  app.innerHTML='<div class="loading"><div class="spinner"></div><p class="mt-8">计算最佳时间...</p></div>';
  try{
    if(!S.currentEvent||S.currentEvent.id!==eid) S.currentEvent=await api('GET',`/api/events/${eid}`);
    S.results=await api('GET',`/api/events/${eid}/results`);
  }catch(e){app.innerHTML=`<div class="card"><h2>加载失败</h2><p class="tm-c">${esc(e.message)}</p></div>`;return}

  const ev=S.currentEvent, res=S.results, total=res.total_participants;
  const gridGranularity=inferEventGranularity(ev);
  const isAdmin=!!localStorage.getItem('admin_'+eid);
  let recH='';
  if(res.recommendations.length>0){
    res.recommendations.slice(0,3).forEach((r,i)=>{
      const availableCount=r.available_names.length;
      const percentage=total>0?Math.round(availableCount*100/total):0;
      recH+=`<div class="rec-card"><span class="rr">${i+1}</span><span class="rt">${r.start_time} - ${r.end_time}</span>
        <div class="rd">${fmtDate(r.date)}</div>
        <div class="rp">
          <span class="rp-chip">总人数 ${total}</span>
          <span class="rp-chip em">有空 ${availableCount}</span>
          <span class="rp-chip em">占比 ${percentage}%</span>
          ${r.maybe_names.length?`<span class="rp-chip">也许 ${r.maybe_names.length}</span>`:''}
        </div></div>`;
    });
  }else recH='<p class="tm-c tc">还没有足够的数据生成共同有空的时间</p>';

  // Heatmap
  const dates=ev.dates;
  const allTimes=new Set();dates.forEach(d=>d.slots.forEach(s=>allTimes.add(s.start_time)));
  const tLabels=Array.from(allTimes).sort();
  const slotScores={};res.ranked_slots.forEach(s=>{slotScores[s.slot_id]=s});
  const slotLookup={};dates.forEach((d,di)=>d.slots.forEach(s=>{slotLookup[di+'_'+s.start_time]=s}));
  const wg=[];let lm=null;dates.forEach((d,i)=>{const m=toDS(getMon(new Date(d.date+'T00:00:00')));if(m!==lm){wg.push(i);lm=m}});

  let hH=`<div class="avail-grid" style="grid-template-columns:54px repeat(${dates.length},1fr)">`;
  hH+=`<div class="corner"></div>`;
  dates.forEach((d,i)=>{
    const sd=shortD(d.date);const we=isWE(d.date)?' we':'';const wb=wg.includes(i)&&i>0?' wb':'';
    hH+=`<div class="dh${we}${wb}"><div class="dow">${sd.dow}</div>${sd.md}</div>`;
  });
  tLabels.forEach(time=>{
    hH+=`<div class="tl">${timeLabelHtml(time,gridGranularity)}</div>`;
    dates.forEach((d,di)=>{
      const slot=slotLookup[di+'_'+time];
      const wb=wg.includes(di)&&di>0?' wb':'';
      if(slot){
        const info=slotScores[slot.id]||{available_count:0,maybe_count:0,available:[],maybe:[]};
        const ac=info.available_count||0,mc=info.maybe_count||0;
        let lv=0;
        if(total>0){const r=ac/total;if(r>=1)lv=5;else if(r>=.75)lv=4;else if(r>=.5)lv=3;else if(r>=.25)lv=2;else if(ac+mc>0)lv=1}
        const an=(info.available||[]).join('、'),mn=(info.maybe||[]).join('、');
        hH+=`<div class="heat-cell level-${lv}${wb}" data-avail="${esc(an)}" data-maybe="${esc(mn)}" data-time="${time}" data-ac="${ac}" data-mc="${mc}"
          onmouseenter="showTip(event,this)" onmouseleave="hideTip()" onclick="showTip(event,this)">${ac||''}</div>`;
      }else{
        hH+=`<div class="avail-cell disabled${wb}"></div>`;
      }
    });
  });
  hH+=`</div>`;

  let pH='<ul class="plist">';
  res.participants_status.forEach(p=>{
    const c=p.has_responded?'ok':'no',t=p.has_responded?'已填写':'未填写';
    pH+=`<li><span class="sdot ${c}"></span>${esc(p.name)} <span class="tm-c">${t}</span></li>`;
  });
  pH+=`</ul>`;

  app.innerHTML=`
    <div class="card">
      <div class="dash-head">
        <div>
          <h2>${esc(ev.title)} · 投票结果</h2>
          <p class="tm-c">${total} 位参与投票者</p>
        </div>
        <button class="icon-nav-btn" onclick="nav('/')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.5 3.5L6 8l4.5 4.5"></path></svg><span>首页</span></button>
      </div>
    </div>
    <div class="card"><h2>共同有空的时间</h2>${recH}</div>
    <div class="card"><h2>各时段投票统计</h2>
      <div class="legend">
        <div class="legend-item"><div class="lc" style="background:#E2E8F0"></div>不可选</div>
        <div class="legend-item"><div class="lc" style="background:#F1F5F9"></div>0人</div>
        <div class="legend-item"><div class="lc" style="background:#BBF7D0"></div>少数</div>
        <div class="legend-item"><div class="lc" style="background:#4ADE80"></div>半数</div>
        <div class="legend-item"><div class="lc" style="background:#22C55E"></div>多数</div>
        <div class="legend-item"><div class="lc" style="background:#15803D"></div>全员</div>
      </div>
      <div class="grid-wrapper">${hH}</div>
    </div>
    <div class="card"><h2>参与投票者</h2>${pH}</div>
    <div class="btn-row">
      <button class="btn btn-p" onclick="shareLink('${eid}')">分享</button>
    </div>`;

  window._rt=setInterval(()=>{if(getRoute()===`/event/${eid}/results`)renderResults(eid);else clearInterval(window._rt)},30000);
}

function showTip(e,el){
  const a=el.dataset.avail,m=el.dataset.maybe,t=el.dataset.time;
  let h=`<div class="tt">${t}</div>`;
  if(a)h+=`<div class="ta">有空：${a}</div>`;
  if(m)h+=`<div class="tm">也许：${m}</div>`;
  if(!a&&!m)h+=`<div>暂无人标记</div>`;
  tooltip.innerHTML=h;tooltip.style.display='block';
  const r=el.getBoundingClientRect();
  let l=r.left+r.width/2-110,tp=r.bottom+8;
  if(l<8)l=8;if(l+220>window.innerWidth)l=window.innerWidth-228;
  if(tp+100>window.innerHeight)tp=r.top-80;
  tooltip.style.left=l+'px';tooltip.style.top=tp+'px';
}
function hideTip(){tooltip.style.display='none'}
